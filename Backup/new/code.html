  <style>
    :root {
      --primary: #1E3A8A;
      --primary-light: #3B5CB8;
      --primary-dark: #152A66;
      --secondary: #F97316;
      --secondary-light: #FB923C;

      --white: #FFFFFF;
      --border: #E5E7EB;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {

    a {

      font-weight: 500;
      text-align: center;

      color: var(--secondary);

    }

    .page-header::before {

    @keyframes float {

      50% { transform: translateY(-20px) rotate(5deg); }

    @keyframes orbFloat {

      75% { transform: translate(-30px, -10px) scale(1.02); }

    /* Text Highlight */
    .text-highlight {

    .text-highlight::after {

    .about-feature-card.featured h3,

    .about-feature-card.featured:hover {

    .card-icon-wrapper {

    .card-icon {

    .about-feature-card.featured .card-icon {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);

    .card-icon-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed rgba(30, 58, 138, 0.2);
      animation: rotate 20s linear infinite;
    }

    .about-feature-card.featured .card-icon-ring {
      border-color: rgba(255, 255, 255, 0.3);

    @keyframes rotate {

    .card-decoration {
      position: absolute;

    }

    /* Navbar */
    .navbar {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 12px 0;
      transition: all 0.3s ease;
      border-bottom: 1px solid transparent;
      margin-top: 50px;
    }

    .navbar.scrolled {
      padding: 12px 0;
      box-shadow: var(--shadow-md);
      border-bottom: 1px solid var(--border);
      margin-top: 0px;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
    }

    .navbar-brand img {
      height: 44px;
      width: auto;
      border-radius: 10px;
    }

    .brand-kwik {
      color: var(--primary);
    }

    .brand-learn {
      color: var(--secondary);
    }

    .navbar-nav .nav-link {
      color: var(--text-dark);
      font-weight: 600;
      font-size: 15px;
      padding: 8px 16px !important;
      border-radius: var(--radius-sm);
      transition: all 0.3s ease;
    }

    .navbar-nav .nav-link:hover {
      color: var(--primary);
      /* background: var(--bg-light); */
    }

    .navbar-nav .nav-link.active {
      color: var(--primary);
    }

    .btn-waitlist {
      background: var(--secondary);
      color: var(--white);
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 50px;
      border: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.3);
    }

    .btn-waitlist:hover {
      background: var(--secondary-dark);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
    }

    .navbar-toggler {
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
    }

    .navbar-toggler:focus {
      box-shadow: none;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(180deg, #EFF6FF 0%, #FFFFFF 100%);
      padding: 80px 0 100px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(30, 58, 138, 0.06) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
      color: #92400E;
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
      border: 1px solid #FCD34D;
      animation: pulse-badge 2s infinite;
    }

    @keyframes pulse-badge {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.02);
      }
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -0.03em;
    }

    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-description {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 540px;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 40px;
    }

    .btn-primary-hero {
      background: var(--primary);
      color: var(--white);
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 14px rgba(30, 58, 138, 0.3);
    }

    .btn-primary-hero:hover {
      background: var(--primary-dark);
      color: var(--white);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(30, 58, 138, 0.4);
    }

    .btn-secondary-hero {
      background: var(--white);
      color: var(--text-dark);
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      border: 2px solid var(--border);
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .btn-secondary-hero:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .btn-coming-soon {
      background: var(--bg-light);
      color: var(--text-muted);
      font-weight: 600;
      padding: 16px 28px;
      border-radius: 50px;
      border: 1px dashed var(--border);
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: default;
    }

    .hero-trust-points {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .trust-point {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 15px;
    }

    .trust-point i {
      color: #10B981;
      font-size: 18px;
    }

    /* Hero Card / Dashboard Preview */
    .hero-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 16px;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(30, 58, 138, 0.1);
      position: relative;
    }

    .dashboard-preview {
      background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-lg);
      padding: 24px;
      color: var(--white);
      min-height: 480px;
      position: relative;
      overflow: hidden;
    }

    .dashboard-preview::before {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .dashboard-title {
      font-weight: 700;
      font-size: 16px;
    }

    .live-badge {
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .dashboard-card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .progress-bar-custom {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      background: #10B981;
      border-radius: 50px;
      transition: width 1s ease;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
    }

    .stat-label {
      font-size: 13px;
      opacity: 0.85;
    }

    .subject-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .subject-pill {
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Section Styles */
    section {
      padding: 100px 0;
      position: relative;
      overflow: hidden;
    }

    .section-header {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 60px;
      position: relative;
      z-index: 2;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-light);
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .section-header p {
      font-size: 18px;
      color: var(--text-muted);
    }

    /* Wave Dividers */
    .wave-divider {
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }

    .wave-divider.top {
      top: 0;
      transform: rotate(180deg);
    }

    .wave-divider.bottom {
      bottom: 0;
    }

    .wave-divider svg {
      position: relative;
      display: block;
      width: calc(100% + 1.3px);
      height: 60px;
    }

    /* Floating Decorative Elements */
    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .floating-shape.circle-1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, transparent 70%);
      top: 10%;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }

    .floating-shape.circle-2 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(30, 58, 138, 0.08) 0%, transparent 70%);
      bottom: 20%;
      left: -50px;
      animation: float 10s ease-in-out infinite reverse;
    }

    .floating-shape.dots-pattern {
      width: 150px;
      height: 150px;
      background-image: radial-gradient(circle, var(--primary) 2px, transparent 2px);
      background-size: 20px 20px;
      opacity: 0.15;
      border-radius: 0;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(5deg);
      }
    }

    /* About Section */
    #about {
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
      position: relative;
    }

    #about::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 50%, var(--primary) 100%);
    }

    #about::after {
      content: '';
      position: absolute;
      top: 60px;
      right: 5%;
      width: 100px;
      height: 100px;
      background-image: radial-gradient(circle, var(--secondary) 2px, transparent 2px);
      background-size: 15px 15px;
      opacity: 0.2;
      border-radius: 0;
    }

    .about-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #FAFBFF 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      height: 100%;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .about-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .about-card::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(30, 58, 138, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      transition: transform 0.4s ease;
    }

    .about-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px -12px rgba(30, 58, 138, 0.2);
      border-color: rgba(30, 58, 138, 0.15);
    }

    .about-card:hover::before {
      transform: scaleX(1);
    }

    .about-card:hover::after {
      transform: scale(1.5);
    }

    .about-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      box-shadow: 0 8px 16px -4px rgba(30, 58, 138, 0.3);
      position: relative;
      z-index: 1;
    }

    .about-card h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .about-card p {
      font-size: 15px;
      line-height: 1.7;
    }

    /* Features Section */
    #features {
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 50%, #C7D2FE 100%);
      position: relative;
    }

    #features::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, transparent 0%, #EEF2FF 100%);
      pointer-events: none;
    }

    #features .floating-accent {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.12) 0%, transparent 60%);
      border-radius: 50%;
      bottom: -100px;
      left: -100px;
      pointer-events: none;
    }

    #features .floating-accent-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(30, 58, 138, 0.1) 0%, transparent 60%);
      border-radius: 50%;
      top: 50px;
      right: -50px;
      pointer-events: none;
    }

    .feature-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
      position: relative;
      border: 2px solid transparent;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgba(30, 58, 138, 0.25);
      border-color: rgba(30, 58, 138, 0.1);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-image {
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      position: relative;
      overflow: hidden;
    }

    .feature-image::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, transparent 50%);
      border-radius: 50%;
    }

    .feature-image img {
      max-width: 100%;
      /* max-height: 180px; */
      max-height: 480px;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
    }

    .feature-placeholder {
      width: 100%;
      max-width: 200px;
      height: 160px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 48px;
    }

    .feature-content {
      padding: 28px;
    }

    .feature-content h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .feature-content p {
      font-size: 15px;
      line-height: 1.7;
    }

    /* Why Section */
    #why {
      background: linear-gradient(180deg, #FFFFFF 0%, #FFF7ED 50%, #FFEDD5 100%);
      position: relative;
    }

    #why::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--secondary) 0%, #FBBF24 50%, var(--secondary) 100%);
    }

    #why .section-accent {
      position: absolute;
      top: 100px;
      left: 5%;
      width: 80px;
      height: 80px;
      background-image: radial-gradient(circle, var(--primary) 3px, transparent 3px);
      background-size: 16px 16px;
      opacity: 0.15;
    }

    .why-content h2 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      margin-bottom: 20px;
      line-height: 1.15;
    }

    .why-content p {
      font-size: 17px;
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .checklist {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      color: var(--text-muted);
      font-size: 16px;
    }

    .checklist li:last-child {
      border-bottom: none;
    }

    .checklist li i {
      color: #10B981;
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .phone-mockup {
      max-width: 340px;
      margin: 0 auto;
      background: #1F2937;
      border-radius: 40px;
      padding: 12px;
      box-shadow: var(--shadow-xl);
    }

    .phone-screen {
      background: linear-gradient(180deg, #EFF6FF 0%, #FFFFFF 100%);
      border-radius: 32px;
      padding: 20px;
      min-height: 580px;
    }

    .phone-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .phone-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }

    .phone-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .phone-card p {
      font-size: 14px;
      margin: 0;
    }

    /* How It Works Section */
    #how-it-works {
      background: linear-gradient(180deg, #F0FDF4 0%, #DCFCE7 50%, #D1FAE5 100%);
      position: relative;
    }

    #how-it-works::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z' fill='%23FFFFFF' opacity='.5'/%3E%3Cpath d='M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z' fill='%23FFFFFF' opacity='.6'/%3E%3C/svg%3E") no-repeat center top;
      background-size: 100% 80px;
      pointer-events: none;
    }

    #how-it-works .step-connector {
      position: absolute;
      top: 50%;
      left: 100%;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, #10B981 0%, transparent 100%);
      transform: translateY(-50%);
    }

    @media (max-width: 991px) {
      #how-it-works .step-connector {
        display: none;
      }
    }

    .step-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F0FDF4 100%);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      text-align: center;
      height: 100%;
      box-shadow: var(--shadow-md);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      border: 2px solid transparent;
    }

    .step-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      padding: 2px;
      background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .step-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.25);
    }

    .step-card:hover::before {
      opacity: 1;
    }

    .step-number {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
